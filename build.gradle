plugins {
    id 'distribution'
    id 'com.diffplug.spotless'
}
import org.apache.tools.ant.filters.ReplaceTokens

def branchName = System.getenv('CIRCLE_BRANCH')
    ?: 'git rev-parse --abbrev-ref HEAD'.execute().text.trim()

def issueSuffix = ''
if (branchName && branchName != 'main') {
    def m = (branchName =~ /(?:^|\/)(gh-\d+)/)
    if (m) issueSuffix = "-${m[0][1]}"
}

version = "1.0.0.${buildNumber}${issueSuffix}"

def nodeExe = ['which', 'node'].execute().text.trim()

spotless {
    groovyGradle {
        target '**/*.gradle'
        leadingTabsToSpaces(4)
    }
    yaml {
        target '**/*.yml'
        prettier().nodeExecutable(nodeExe)
    }
}

distributions {
    givewpWebhooksAddon {
        contents {
            distributionBaseName = 'givewp-webhooks-addon'
            from(projectDir) {
                exclude '**/*.gradle'
                exclude '.gradle'
                exclude 'gradle*'
                exclude 'build'
                exclude '.circleci'
                exclude '.claude'
                exclude '.idea'
                exclude '.gitignore'
                exclude 'vendor'
                exclude 'composer.json'
                exclude 'composer.lock'
                exclude 'tests'
                exclude 'phpcs.xml'
                exclude 'phpunit.xml'
                exclude '.phpunit.result.cache'
                exclude 'givewp-webhooks.php'
            } into "/${project.name}"
            from(projectDir) {
                include 'givewp-webhooks.php'
                filter(ReplaceTokens, tokens: [projectVersion: project.version.toString()])
            } into "/${project.name}"
        }
    }
}

tasks.register('composerInstall', Exec) {
    commandLine 'composer', 'install', '--no-interaction', '--prefer-dist', '--no-progress'
}

tasks.register('phpcs', Exec) {
    dependsOn composerInstall
    commandLine 'vendor/bin/phpcs'
}

tasks.register('phpcbf', Exec) {
    dependsOn composerInstall
    commandLine 'vendor/bin/phpcbf'
    // phpcbf exits 1 when it fixes violations (success), 2 on failure.
    // Treat exit code 1 as success so Gradle doesn't mark the task failed.
    ignoreExitValue = true
    doLast {
        if (executionResult.get().exitValue == 2) {
            throw new GradleException('phpcbf encountered unfixable violations')
        }
    }
}

tasks.register('phpunit', Exec) {
    dependsOn composerInstall
    doFirst {
        mkdir 'build/test-results/phpunit'
    }
    commandLine 'vendor/bin/phpunit'
}

tasks.named('givewpWebhooksAddonDistZip') {
    mustRunAfter check
}

tasks.named('givewpWebhooksAddonDistTar') {
    mustRunAfter check
}

tasks.named('wrapper') {
    gradleVersion = '9.5.1'
}

tasks.named('check') {
    dependsOn phpcs, phpunit
}
